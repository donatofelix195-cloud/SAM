    // Component: NewRoundModal
    function NewRoundModal({ onSave, onCancel, localUserName }) {
      // Cargar borrador guardado de localStorage
      const savedDraft = (() => {
        try {
          const raw = localStorage.getItem('sams_draft_form');
          return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
      })();

      const [step, setStep] = useState(savedDraft ? savedDraft.step || 1 : 1);
      const [name, setName] = useState(savedDraft ? savedDraft.name || '' : '');
      const [totalAmount, setTotalAmount] = useState(savedDraft ? savedDraft.totalAmount || 10000 : 10000);
      const [frequency, setFrequency] = useState(savedDraft ? savedDraft.frequency || Frequency.BIWEEKLY : Frequency.BIWEEKLY);
      const [startDate, setStartDate] = useState(() => {
        if (savedDraft && savedDraft.startDate) return savedDraft.startDate;
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      });
      const [paymentDay1, setPaymentDay1] = useState(savedDraft ? savedDraft.paymentDay1 || 10 : 10);
      const [paymentDay2, setPaymentDay2] = useState(savedDraft ? savedDraft.paymentDay2 || 25 : 25);
      const [roundId] = useState(() => savedDraft ? savedDraft.roundId || `round-${Date.now()}` : `round-${Date.now()}`);

      const [participants, setParticipants] = useState(() => {
        if (savedDraft && savedDraft.participants && savedDraft.participants.length > 0) {
          return savedDraft.participants;
        }
        return [{ id: 'creator-1', name: `${localUserName}`, ticketsCount: 1 }];
      });
      const [newParticipantName, setNewParticipantName] = useState('');
      const [copiedDraftInvite, setCopiedDraftInvite] = useState(false);

      // Auto-guardar borrador en localStorage cada vez que cambie algo
      useEffect(() => {
        const draft = { step, name, totalAmount, frequency, startDate, paymentDay1, paymentDay2, roundId, participants };
        localStorage.setItem('sams_draft_form', JSON.stringify(draft));
      }, [step, name, totalAmount, frequency, startDate, paymentDay1, paymentDay2, participants]);

      // Limpiar borrador cuando se crea o cancela
      const clearDraft = () => localStorage.removeItem('sams_draft_form');


      const handleCopyDraftInvite = () => {
        try {
          const draftRound = {
            id: roundId,
            name: name.trim(),
            totalAmount,
            contributionPerTicket,
            frequency,
            startDate,
            status: RoundStatus.DRAFT,
            participants,
            createdAt: new Date().toISOString()
          };

          const rawB64 = btoa(unescape(encodeURIComponent(JSON.stringify(draftRound))));
          const shareUrl = `${window.location.origin}${window.location.pathname}?import=${rawB64}`;
          
          navigator.clipboard.writeText(shareUrl).then(() => {
            setCopiedDraftInvite(true);
            setTimeout(() => setCopiedDraftInvite(false), 2000);
          });
        } catch(e) {
          alert("Error al generar el enlace de invitación al borrador.");
        }
      };
      const handleImportStaticToken = () => {
        const rawToken = prompt("Pega el código de confirmación enviado por tu participante:");
        if (!rawToken || !rawToken.trim()) return;

        try {
          const cleanToken = rawToken.trim();
          let tokenPart = cleanToken;
          if (cleanToken.includes('\n')) {
            const lines = cleanToken.split('\n');
            tokenPart = lines[lines.length - 1].trim();
          }

          const decodedData = JSON.parse(decodeURIComponent(escape(atob(tokenPart))));
          if (decodedData.name && decodedData.ticketsCount) {
            const existingIndex = participants.findIndex(p => p.name.trim().toLowerCase() === decodedData.name.trim().toLowerCase());
            if (existingIndex >= 0) {
              handleUpdateTickets(participants[existingIndex].id, decodedData.ticketsCount);
              alert(`¡Actualizado! ${decodedData.name} ahora tiene ${decodedData.ticketsCount} cupo(s).`);
            } else {
              const newP = {
                id: `p-${Date.now()}-${Math.random()}`,
                name: decodedData.name.trim(),
                ticketsCount: decodedData.ticketsCount
              };
              setParticipants([...participants, newP]);
              alert(`¡Participante agregado! ${decodedData.name} se unió con ${decodedData.ticketsCount} cupo(s).`);
            }
          } else {
            alert("El código de confirmación no tiene el formato esperado.");
          }
        } catch(e) {
          console.error(e);
          alert("Código inválido. Asegúrate de copiar el código completo.");
        }
      };
      const totalTickets = participants.reduce((acc, p) => acc + p.ticketsCount, 0);
      const contributionPerTicket = totalTickets > 0 ? Math.round((totalAmount / totalTickets)) : 0;

      const handleAddParticipant = (e) => {
        e.preventDefault();
        if (!newParticipantName.trim()) return;
        
        const newP = {
          id: `p-${Date.now()}-${Math.random()}`,
          name: newParticipantName.trim(),
          ticketsCount: 1
        };
        
        setParticipants([...participants, newP]);
        setNewParticipantName('');
      };

      const handleRemoveParticipant = (id) => {
        if (id === 'creator-1') {
          alert("No puedes eliminar al organizador.");
          return;
        }
        setParticipants(participants.filter(p => p.id !== id));
      };

      const handleUpdateTickets = (id, count) => {
        if (count < 1) return;
        setParticipants(participants.map(p => p.id === id ? { ...p, ticketsCount: count } : p));
      };

      const handleNextStep = () => {
        if (!name.trim()) {
          alert('Por favor ingresa un nombre para el Sam / Tanda.');
          return;
        }
        if (totalAmount <= 0) {
          alert('Por favor ingresa un monto total válido.');
          return;
        }
        setStep(2);
      };

      const handleCreateRound = () => {
        if (participants.length < 2) {
          alert('Por favor registra al menos 2 participantes para iniciar.');
          return;
        }

        const draftRound = {
          id: roundId,
          name: name.trim(),
          totalAmount,
          contributionPerTicket,
          frequency,
          startDate,
          status: RoundStatus.DRAFT,
          participants,
          tickets: [],
          periods: [],
          payments: [],
          createdAt: new Date().toISOString(),
          paymentDay1: (frequency === Frequency.MONTHLY || frequency === Frequency.BIWEEKLY) ? paymentDay1 : undefined,
          paymentDay2: frequency === Frequency.BIWEEKLY ? paymentDay2 : undefined,
        };

        clearDraft();
        onSave(draftRound);
      };

      return (
        <div className="max-w-3xl mx-auto bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden">
          {/* Header */}
          <div className="bg-gradient-to-r from-indigo-900 via-indigo-800 to-indigo-750 text-white p-8">
            <span className="bg-indigo-700/60 text-indigo-100 text-xs font-mono px-3 py-1 rounded-full uppercase tracking-wider font-semibold">
              Crear Nuevo Sam / Tanda
            </span>
            <h2 className="text-2xl font-display font-bold tracking-tight mt-2">Configura tu Bolso Grupal</h2>
            <p className="text-indigo-100/70 text-xs mt-1">Sigue los pasos para definir el pozo, registrar participantes e iniciar el sorteo de turnos.</p>
          </div>

          <div className="p-8">
            {/* Step Indicators */}
            <div className="flex items-center justify-center gap-3 mb-8">
              <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold font-mono border ${step === 1 ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>1</span>
              <div className="w-12 h-0.5 bg-slate-200" />
              <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold font-mono border ${step === 2 ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>2</span>
            </div>

            {step === 1 ? (
              <div className="space-y-6">
                {localStorage.getItem('sams_draft_form') && (
                  <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4 flex items-center justify-between gap-4">
                    <div className="flex items-center gap-2.5">
                      <div className="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-700">
                        <Icon name="Clock" className="w-4 h-4" />
                      </div>
                      <div>
                        <h4 className="text-xs font-bold text-amber-900">Borrador Restaurado</h4>
                        <p className="text-[10px] text-amber-750">Recuperamos los datos que estabas editando anteriormente.</p>
                      </div>
                    </div>
                    <button
                      type="button"
                      onClick={() => {
                        if (confirm("¿Estás seguro de que quieres borrar el borrador y empezar de cero?")) {
                          clearDraft();
                          setName('');
                          setTotalAmount(10000);
                          setFrequency(Frequency.BIWEEKLY);
                          const today = new Date();
                          const yyyy = today.getFullYear();
                          const mm = String(today.getMonth() + 1).padStart(2, '0');
                          const dd = String(today.getDate()).padStart(2, '0');
                          setStartDate(`${yyyy}-${mm}-${dd}`);
                          setPaymentDay1(10);
                          setPaymentDay2(25);
                          setParticipants([{ id: 'creator-1', name: `${localUserName}`, ticketsCount: 1 }]);
                          setStep(1);
                        }
                      }}
                      className="text-[10px] font-bold text-amber-700 hover:text-amber-900 bg-amber-100/50 hover:bg-amber-100 px-3 py-1.5 rounded-lg transition-all"
                    >
                      Empezar de Cero
                    </button>
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                    <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre del Sam / Tanda</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Tanda de Oficina Navidad" 
                      value={name} 
                      onChange={(e) => setName(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-medium transition-all"
                    />
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Monto Total del Pozo ($)</label>
                    <input 
                      type="number" 
                      value={totalAmount === 0 ? '' : totalAmount} 
                      onChange={(e) => setTotalAmount(e.target.value === '' ? 0 : parseInt(e.target.value))}
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-medium transition-all"
                    />
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Frecuencia de Aportes</label>
                    <select 
                      value={frequency} 
                      onChange={(e) => setFrequency(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-medium transition-all bg-white"
                    >
                      <option value={Frequency.WEEKLY}>Semanal</option>
                      <option value={Frequency.BIWEEKLY}>Quincenal</option>
                      <option value={Frequency.MONTHLY}>Mensual</option>
                    </select>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Fecha de Inicio</label>
                    <input 
                      type="date" 
                      value={startDate} 
                      onChange={(e) => setStartDate(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-medium transition-all"
                    />
                  </div>
                </div>

                {/* Custom Days for Monthly / Biweekly */}
                {frequency === Frequency.MONTHLY && (
                  <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50 space-y-2">
                    <h4 className="text-xs font-bold text-indigo-900 uppercase">Día del mes para Cobro</h4>
                    <p className="text-[10px] text-indigo-700/80">Configura en qué día de cada mes se espera recibir el aporte de cada cupo.</p>
                    <input 
                      type="number" 
                      min="1" 
                      max="31" 
                      value={paymentDay1} 
                      onChange={(e) => setPaymentDay1(parseInt(e.target.value) || 1)}
                      className="w-24 px-3 py-1.5 rounded-lg border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm font-bold text-indigo-900"
                    />
                  </div>
                )}

                {frequency === Frequency.BIWEEKLY && (
                  <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50 space-y-4">
                    <h4 className="text-xs font-bold text-indigo-900 uppercase">Días del mes alternos para Cobro</h4>
                    <p className="text-[10px] text-indigo-700/80">Configura las dos fechas quincenales fijas (ej. 15 y 30) para las cuotas quincenales.</p>
                    <div className="flex gap-4">
                      <div>
                        <span className="text-[10px] text-slate-500 font-semibold block mb-1">Primer Día</span>
                        <input 
                          type="number" 
                          min="1" 
                          max="31" 
                          value={paymentDay1} 
                          onChange={(e) => setPaymentDay1(parseInt(e.target.value) || 1)}
                          className="w-24 px-3 py-1.5 rounded-lg border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm font-bold text-indigo-900"
                        />
                      </div>
                      <div>
                        <span className="text-[10px] text-slate-500 font-semibold block mb-1">Segundo Día</span>
                        <input 
                          type="number" 
                          min="1" 
                          max="31" 
                          value={paymentDay2} 
                          onChange={(e) => setPaymentDay2(parseInt(e.target.value) || 1)}
                          className="w-24 px-3 py-1.5 rounded-lg border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm font-bold text-indigo-900"
                        />
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex justify-end pt-4 border-t border-slate-100">
                  <button 
                    onClick={onCancel}
                    className="py-3 px-6 rounded-xl border border-slate-200 hover:bg-slate-50 font-semibold text-xs text-slate-700 mr-3 transition-colors"
                  >
                    Cancelar
                  </button>
                  <button 
                    onClick={handleNextStep}
                    className="py-3 px-6 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs transition-all shadow-md flex items-center gap-1.5"
                  >
                    Siguiente: Participantes <Icon name="ArrowRight" className="w-4 h-4" />
                  </button>
                </div>
              </div>
            ) : (
              <div className="space-y-6">
                {/* Participant registration */}
                <form onSubmit={handleAddParticipant} className="flex gap-3">
                  <div className="flex-1">
                    <input 
                      type="text" 
                      placeholder="Nombre del participante..." 
                      value={newParticipantName}
                      onChange={(e) => setNewParticipantName(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-medium transition-all"
                    />
                  </div>
                  <button 
                    type="submit"
                    className="bg-slate-900 hover:bg-slate-800 text-white px-5 rounded-xl font-bold text-xs flex items-center gap-1 transition-all"
                  >
                    <Icon name="Plus" className="w-4 h-4" /> Agregar
                  </button>
                </form>

                {/* Botones para compartir invitación y registrar confirmaciones */}
                <div className="flex flex-col sm:flex-row gap-3">
                  <button 
                    type="button"
                    onClick={handleCopyDraftInvite}
                    className="flex-1 py-3 px-4 rounded-xl border border-indigo-200 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold text-xs flex items-center justify-center gap-1.5 transition-all shadow-sm"
                  >
                    <Icon name="Share2" className="w-4 h-4" /> 
                    {copiedDraftInvite ? '¡Enlace Copiado!' : 'Copiar Enlace de Invitación'}
                  </button>

                  <button 
                    type="button"
                    onClick={handleImportStaticToken}
                    className="flex-1 py-3 px-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-semibold text-xs flex items-center justify-center gap-1.5 transition-all shadow-sm"
                  >
                    <Icon name="Upload" className="w-4 h-4" /> 
                    Registrar Código de Invitado
                  </button>
                </div>

                {/* List of registered */}
                <div className="border border-slate-100 rounded-2xl overflow-hidden max-h-72 overflow-y-auto">
                  <table className="w-full text-left text-xs">
                    <thead className="bg-slate-50 border-b border-slate-100 text-slate-400 font-bold uppercase tracking-wider">
                      <tr>
                        <th className="px-6 py-3.5">Nombre</th>
                        <th className="px-6 py-3.5 text-center">Nº de Cupos (Tickets)</th>
                        <th className="px-6 py-3.5 text-right">Acción</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50 text-slate-700 font-medium">
                      {participants.map(p => (
                        <tr key={p.id} className="hover:bg-slate-50/50">
                          <td className="px-6 py-4">{p.name}</td>
                          <td className="px-6 py-4 flex justify-center">
                            <div className="flex items-center gap-2 bg-slate-50 border border-slate-100 px-3 py-1 rounded-lg">
                              <button 
                                onClick={() => handleUpdateTickets(p.id, p.ticketsCount - 1)}
                                className="text-slate-400 hover:text-slate-600 font-black"
                              >
                                -
                              </button>
                              <span className="font-mono font-bold w-6 text-center">{p.ticketsCount}</span>
                              <button 
                                onClick={() => handleUpdateTickets(p.id, p.ticketsCount + 1)}
                                className="text-slate-400 hover:text-slate-600 font-black"
                              >
                                +
                              </button>
                            </div>
                          </td>
                          <td className="px-6 py-4 text-right">
                            {p.id !== 'creator-1' && (
                              <button 
                                onClick={() => handleRemoveParticipant(p.id)}
                                className="text-slate-400 hover:text-rose-600 p-1 hover:bg-rose-50 rounded"
                              >
                                <Icon name="Trash2" className="w-4 h-4" />
                              </button>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Summary Box */}
                <div className="bg-indigo-50 border border-indigo-100 rounded-3xl p-5 grid grid-cols-3 gap-6 text-center">
                  <div>
                    <span className="text-[10px] text-indigo-600 font-semibold uppercase tracking-wider">Total Participantes</span>
                    <h4 className="font-display font-black text-indigo-950 text-lg">{participants.length}</h4>
                  </div>
                  <div>
                    <span className="text-[10px] text-indigo-600 font-semibold uppercase tracking-wider">Cupos Totales (Turnos)</span>
                    <h4 className="font-display font-black text-indigo-950 text-lg">{totalTickets}</h4>
                  </div>
                  <div>
                    <span className="text-[10px] text-indigo-600 font-semibold uppercase tracking-wider">Cuota por Cupo</span>
                    <h4 className="font-display font-black text-indigo-950 text-lg">${contributionPerTicket.toLocaleString()}</h4>
                  </div>
                </div>

                <div className="flex justify-between pt-4 border-t border-slate-100">
                  <button 
                    onClick={() => setStep(1)}
                    className="py-3 px-6 rounded-xl border border-slate-200 hover:bg-slate-50 font-semibold text-xs text-slate-700 transition-colors flex items-center gap-1"
                  >
                    <Icon name="ArrowLeft" className="w-4 h-4" /> Atrás
                  </button>
                  <button 
                    onClick={handleCreateRound}
                    className="py-3 px-6 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs transition-all shadow-md flex items-center gap-1.5"
                  >
                    Crear Sam y Rifar Turnos <Icon name="Award" className="w-4 h-4" />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Component: RaffleAnimation
    function RaffleAnimation({ round, onComplete, onCancel }) {
      const participants = round.participants;
      const [draftTickets, setDraftTickets] = useState(() => Array(participants.reduce((acc, p) => acc + p.ticketsCount, 0)).fill(null));
      const [isDrawing, setIsDrawing] = useState(false);
      const [currentDrawingNumber, setCurrentDrawingNumber] = useState(null);
      const [tickerName, setTickerName] = useState('');
      const [step, setStep] = useState('intro');

      const totalTicketsCount = draftTickets.length;

      const getAvailablePool = (currentTickets) => {
        const assignedCounts = {};
        currentTickets.forEach(t => {
          if (t) {
            assignedCounts[t.participantId] = (assignedCounts[t.participantId] || 0) + 1;
          }
        });

        const pool = [];
        participants.forEach(p => {
          const assigned = assignedCounts[p.id] || 0;
          const remaining = p.ticketsCount - assigned;
          for (let i = 0; i < remaining; i++) {
            pool.push({ participantId: p.id, participantName: p.name });
          }
        });
        return pool;
      };

      const handleQuickDraw = () => {
        const pool = getAvailablePool(draftTickets);
        if (pool.length === 0) return;

        const shuffledPool = [...pool].sort(() => Math.random() - 0.5);
        const newTickets = [...draftTickets];
        let poolIndex = 0;
        
        for (let i = 0; i < newTickets.length; i++) {
          if (newTickets[i] === null) {
            const item = shuffledPool[poolIndex++];
            newTickets[i] = {
              id: `ticket-${i + 1}-${Date.now()}-${Math.random()}`,
              number: i + 1,
              participantId: item.participantId,
              participantName: item.participantName
            };
          }
        }
        
        setDraftTickets(newTickets);
        setStep('completed');
      };

      const startSequentialDraw = async () => {
        setIsDrawing(true);
        setStep('drawing');
        
        const newTickets = [...draftTickets];
        
        for (let i = 0; i < newTickets.length; i++) {
          if (newTickets[i] !== null) continue;

          setCurrentDrawingNumber(i + 1);
          const pool = getAvailablePool(newTickets);
          if (pool.length === 0) break;

          const startTime = Date.now();
          const spinDuration = 800;
          
          while (Date.now() - startTime < spinDuration) {
            const randomName = pool[Math.floor(Math.random() * pool.length)].participantName;
            setTickerName(randomName);
            await new Promise(resolve => setTimeout(resolve, 60));
          }

          const finalPool = getAvailablePool(newTickets);
          const randomIndex = Math.floor(Math.random() * finalPool.length);
          const drawnItem = finalPool[randomIndex];

          newTickets[i] = {
            id: `ticket-${i + 1}-${Date.now()}-${Math.random()}`,
            number: i + 1,
            participantId: drawnItem.participantId,
            participantName: drawnItem.participantName
          };

          setDraftTickets([...newTickets]);
          await new Promise(resolve => setTimeout(resolve, 305));
        }

        setIsDrawing(false);
        setCurrentDrawingNumber(null);
        setStep('completed');
      };

      const handleSave = () => {
        if (!draftTickets.every(t => t !== null)) {
          alert('Por favor asigna todos los números antes de continuar.');
          return;
        }
        onComplete(draftTickets);
      };

      return (
        <div className="bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden max-w-4xl mx-auto">
          {/* Header */}
          <div className="bg-gradient-to-r from-indigo-900 via-purple-800 to-indigo-800 text-white p-8 relative overflow-hidden">
            <span className="bg-indigo-700/60 text-indigo-100 text-xs font-mono px-3 py-1 rounded-full uppercase tracking-wider font-semibold">
              Sorteo de Turnos
            </span>
            <h2 className="text-3xl font-display font-bold tracking-tight mt-2 text-white">Rifa los Números del Sam</h2>
            <p className="text-indigo-100/80 text-sm mt-1 max-w-xl">
              Asigna de manera aleatoria y transparente las fechas de cobro de cada participant con una animación dinámica.
            </p>
          </div>

          <div className="p-8 space-y-6">
            {step === 'intro' && (
              <div className="text-center py-12 space-y-8">
                <div className="flex justify-center gap-4">
                  <button 
                    onClick={startSequentialDraw}
                    className="bg-gradient-to-tr from-indigo-600 to-violet-600 text-white py-5 px-8 rounded-2xl shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex flex-col items-center justify-center gap-2 max-w-xs w-full"
                  >
                    <Icon name="Play" className="w-8 h-8" />
                    <span className="text-lg font-bold">Sorteo Animado</span>
                    <span className="text-xs text-indigo-100">Sortea los turnos uno a uno</span>
                  </button>

                  <button 
                    onClick={handleQuickDraw}
                    className="bg-slate-900 hover:bg-slate-800 text-white py-5 px-8 rounded-2xl shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex flex-col items-center justify-center gap-2 max-w-xs w-full"
                  >
                    <Icon name="Shuffle" className="w-8 h-8 text-indigo-400" />
                    <span className="text-lg font-bold">Sorteo Rápido</span>
                    <span className="text-xs text-slate-300">Genera todos los turnos al instante</span>
                  </button>
                </div>
                <button onClick={onCancel} className="text-xs text-slate-400 font-semibold hover:text-slate-605">Cancelar y salir</button>
              </div>
            )}

            {step === 'drawing' && (
              <div className="text-center py-12 space-y-6 bg-slate-50 rounded-3xl border border-slate-100">
                <div className="w-20 h-20 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 mx-auto border-2 border-indigo-100 animate-bounce">
                  <span className="text-3xl font-display font-black">#{currentDrawingNumber}</span>
                </div>
                <div className="space-y-1">
                  <p className="text-xs text-slate-400 uppercase tracking-widest font-mono">Sorteando Turno Actual</p>
                  <h3 className="text-2xl font-display font-black text-indigo-950 animate-pulse">{tickerName || 'Eligiendo...'}</h3>
                </div>
              </div>
            )}

            {step === 'completed' && (
              <div className="space-y-6">
                <div className="bg-emerald-50 border border-emerald-100 rounded-3xl p-6 text-center space-y-2">
                  <div className="w-12 h-12 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto shadow-sm shadow-emerald-500/20">
                    <Icon name="Check" className="w-6 h-6" />
                  </div>
                  <h3 className="font-display font-bold text-emerald-950 text-lg">Sorteo Completado con Éxito</h3>
                  <p className="text-xs text-emerald-700 max-w-sm mx-auto">Revisa la asignación de turnos a continuación y guarda la configuración definitiva del Sam.</p>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  {draftTickets.map((t, idx) => (
                    <div key={idx} className="bg-white border border-slate-100 shadow-sm p-4 rounded-2xl flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-mono font-bold text-xs">
                        {idx + 1}
                      </div>
                      <div className="min-w-0">
                        <span className="text-[10px] text-slate-400 font-semibold block">Turno {idx + 1}</span>
                        <h4 className="text-xs font-bold text-slate-900 truncate">{t ? t.participantName : '-'}</h4>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex gap-4 pt-4 border-t border-slate-100">
                  <button 
                    onClick={round => {
                      setDraftTickets(Array(totalTicketsCount).fill(null));
                      setStep('intro');
                    }}
                    className="py-3 px-6 rounded-xl border border-slate-200 hover:bg-slate-50 font-semibold text-xs text-slate-700 flex items-center gap-1.5"
                  >
                    <Icon name="RotateCcw" className="w-4 h-4" /> Repetir Sorteo
                  </button>
                  <button 
                    onClick={handleSave}
                    className="flex-1 py-3 px-6 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs transition-all shadow-md flex items-center justify-center gap-1.5"
                  >
                    Guardar y Activar Sam <Icon name="Check" className="w-4 h-4" />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Component: RoundDetails
    function RoundDetails({ round, onUpdateRound, onBack, onDeleteRound }) {
      const [activeTab, setActiveTab] = useState('matrix');
      const [selectedPeriodNumber, setSelectedPeriodNumber] = useState(1);
      const [copiedInvite, setCopiedInvite] = useState(false);

      const totalTickets = round.tickets.length;
      const totalPeriods = totalTickets;

      const totalPaidCount = round.payments.filter(p => p.isPaid).length;
      const totalPaymentsCount = round.payments.length;
      const paidRatePercent = totalPaymentsCount > 0 ? Math.round((totalPaidCount / totalPaymentsCount) * 100) : 0;

      const totalCollectedAmount = round.payments.filter(p => p.isPaid).reduce((sum, p) => sum + p.amount, 0);
      const totalOwedAmount = round.payments.filter(p => !p.isPaid).reduce((sum, p) => sum + p.amount, 0);

      const handleTogglePayment = (paymentId) => {
        const updatedPayments = round.payments.map(p => {
          if (p.id === paymentId) {
            return {
              ...p,
              isPaid: !p.isPaid,
              paymentDate: !p.isPaid ? new Date().toISOString().split('T')[0] : undefined
            };
          }
          return p;
        });

        const allPaid = updatedPayments.every(p => p.isPaid);
        const hasUncollectedPayout = round.periods.some(per => !per.isPayoutDelivered);
        const newStatus = (allPaid && !hasUncollectedPayout) ? RoundStatus.COMPLETED : RoundStatus.ACTIVE;

        onUpdateRound({
          ...round,
          payments: updatedPayments,
          status: newStatus
        });
      };

      const handleTogglePayoutDelivered = (periodNumber) => {
        const updatedPeriods = round.periods.map(per => {
          if (per.number === periodNumber) {
            return { ...per, isPayoutDelivered: !per.isPayoutDelivered };
          }
          return per;
        });

        const allPaid = round.payments.every(p => p.isPaid);
        const allPayoutsDelivered = updatedPeriods.every(per => per.isPayoutDelivered);
        const newStatus = (allPaid && allPayoutsDelivered) ? RoundStatus.COMPLETED : RoundStatus.ACTIVE;

        onUpdateRound({
          ...round,
          periods: updatedPeriods,
          status: newStatus
        });
      };

      const handleMarkAllPeriodAsPaid = (periodNumber) => {
        const updatedPayments = round.payments.map(p => {
          if (p.periodNumber === periodNumber) {
            return {
              ...p,
              isPaid: true,
              paymentDate: new Date().toISOString().split('T')[0]
            };
          }
          return p;
        });

        onUpdateRound({
          ...round,
          payments: updatedPayments
        });
      };

      const handleCopyShareUrl = () => {
        try {
          const shareUrl = `${window.location.origin}${window.location.pathname}?roundId=${round.id}`;
          
          navigator.clipboard.writeText(shareUrl).then(() => {
            setCopiedInvite(true);
            setTimeout(() => setCopiedInvite(false), 2000);
          });
        } catch(e) {
          alert("Error generando enlace.");
        }
      };

      const currentPeriodPayments = round.payments.filter(p => p.periodNumber === selectedPeriodNumber);
      const currentPeriod = round.periods.find(per => per.number === selectedPeriodNumber);
      const currentPeriodPaidCount = currentPeriodPayments.filter(p => p.isPaid).length;

      const participantStats = round.participants.map(p => {
        const pTickets = round.tickets.filter(t => t.participantId === p.id);
        const pTicketIds = pTickets.map(t => t.id);
        
        const pPayments = round.payments.filter(pay => pay.participantId === p.id);
        const paidCount = pPayments.filter(pay => pay.isPaid).length;
        const totalCount = pPayments.length;
        
        const amountPaid = pPayments.filter(pay => pay.isPaid).reduce((sum, pay) => sum + pay.amount, 0);
        const amountOwed = pPayments.filter(pay => !pay.isPaid).reduce((sum, pay) => sum + pay.amount, 0);

        const payoutTurns = round.periods.filter(per => pTicketIds.includes(per.beneficiaryTicketId));
        const nextPayoutTurn = payoutTurns.find(per => !per.isPayoutDelivered);

        return {
          ...p,
          tickets: pTickets,
          paidCount,
          totalCount,
          amountPaid,
          amountOwed,
          payoutTurns,
          nextPayoutTurn
        };
      });

      return (
        <div className="space-y-6">
          
          {/* Header Action Bar */}
          <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
            <button 
              onClick={onBack}
              className="inline-flex items-center gap-1.5 text-xs text-slate-550 hover:text-slate-900 font-semibold self-start"
            >
              <Icon name="ArrowLeft" className="w-4 h-4" /> Volver a Rondas
            </button>
            <div className="flex gap-2">
              <button 
                onClick={handleCopyShareUrl}
                className="bg-indigo-50 border border-indigo-100 text-indigo-700 hover:bg-indigo-100 font-semibold text-xs px-4 py-2 rounded-xl transition-all flex items-center gap-1.5"
              >
                <Icon name="Share2" className="w-4 h-4" />
                {copiedInvite ? '¡Enlace Copiado!' : 'Copiar Enlace para Compartir'}
              </button>
              <button 
                onClick={() => onDeleteRound(round.id)}
                className="bg-rose-50 border border-rose-100 text-rose-700 hover:bg-rose-100 font-semibold text-xs px-4 py-2 rounded-xl transition-all flex items-center gap-1.5"
              >
                <Icon name="Trash2" className="w-4 h-4" /> Eliminar
              </button>
            </div>
          </div>

          {/* Quick Info Grid */}
          <div className="bg-gradient-to-r from-indigo-900 via-purple-900 to-indigo-850 rounded-3xl text-white p-6 sm:p-8 relative overflow-hidden">
            <div className="absolute right-0 bottom-0 opacity-5 pointer-events-none transform translate-y-12 translate-x-12">
              <Icon name="Coins" className="w-72 h-72" />
            </div>

            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 relative z-10">
              <div className="space-y-1">
                <span className="text-[10px] text-indigo-200 uppercase tracking-widest font-mono">Nombre del Sam</span>
                <h2 className="text-xl font-display font-bold leading-tight">{round.name}</h2>
                <span className="inline-block px-2.5 py-0.5 rounded-full text-[9px] font-bold bg-indigo-800 text-indigo-100 border border-indigo-700 uppercase tracking-wider">{round.status}</span>
              </div>

              <div className="grid grid-cols-2 col-span-3 gap-6 border-t md:border-t-0 md:border-l border-indigo-800/40 pt-6 md:pt-0 md:pl-6">
                <div>
                  <span className="text-[10px] text-indigo-305 font-semibold uppercase tracking-wider block mb-1">Monto del Pozo</span>
                  <h3 className="text-2xl font-display font-black">${round.totalAmount.toLocaleString()}</h3>
                  <span className="text-[10px] text-indigo-200/80">Cuota: ${round.contributionPerTicket} por cupo</span>
                </div>
                <div>
                  <span className="text-[10px] text-indigo-305 font-semibold uppercase tracking-wider block mb-1">Estado de Ahorros</span>
                  <h3 className="text-2xl font-display font-black text-emerald-400">${totalCollectedAmount.toLocaleString()}</h3>
                  <span className="text-[10px] text-indigo-200/80">Pendiente: ${totalOwedAmount.toLocaleString()}</span>
                </div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex border-b border-slate-200 gap-6 text-sm font-semibold">
            <button 
              onClick={() => setActiveTab('matrix')}
              className={`pb-3 border-b-2 transition-all ${activeTab === 'matrix' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-650'}`}
            >
              Matriz de Pagos
            </button>
            <button 
              onClick={() => setActiveTab('periods')}
              className={`pb-3 border-b-2 transition-all ${activeTab === 'periods' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-650'}`}
            >
              Periodos e Hitos
            </button>
            <button 
              onClick={() => setActiveTab('participants')}
              className={`pb-3 border-b-2 transition-all ${activeTab === 'participants' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-650'}`}
            >
              Participantes ({round.participants.length})
            </button>
          </div>

          {/* Tab: Matrix */}
          {activeTab === 'matrix' && (
            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left text-xs text-slate-700">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-105 text-slate-405 font-bold uppercase tracking-wider">
                      <th className="px-6 py-4">Cupo / Propietario</th>
                      {round.periods.map(per => (
                        <th key={per.number} className="px-4 py-4 text-center min-w-[100px]">
                          <div>Turno {per.number}</div>
                          <div className="text-[10px] text-slate-400 font-mono font-medium">{formatLocalDateShort(per.paymentDate)}</div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 font-medium">
                    {round.tickets.map(ticket => (
                      <tr key={ticket.id} className="hover:bg-slate-50/50">
                        <td className="px-6 py-4">
                          <div className="font-bold text-slate-900">{ticket.participantName}</div>
                          <div className="text-[10px] text-slate-400 font-mono">Nº {ticket.number}</div>
                        </td>
                        {round.periods.map(per => {
                          const payment = round.payments.find(pay => pay.periodNumber === per.number && pay.ticketId === ticket.id);
                          if (!payment) return <td key={per.number} className="text-center">-</td>;
                          return (
                            <td key={per.number} className="px-4 py-4 text-center">
                              <button
                                onClick={() => handleTogglePayment(payment.id)}
                                className={`px-3 py-1.5 rounded-lg border text-[10px] font-bold tracking-wide transition-all ${
                                  payment.isPaid 
                                    ? 'bg-emerald-50 border-emerald-250 text-emerald-700 shadow-sm shadow-emerald-500/5'
                                    : 'bg-rose-50 border-rose-250 text-rose-700 hover:bg-rose-100/50'
                                }`}
                              >
                                {payment.isPaid ? 'PAGADO' : 'PENDIENTE'}
                              </button>
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Tab: Periods */}
          {activeTab === 'periods' && (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              
              {/* Period selection list */}
              <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-4 space-y-2 h-96 overflow-y-auto">
                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider block px-2 mb-2">Selecciona un Periodo</span>
                {round.periods.map(per => {
                  const isWinnerPaid = round.payments.filter(pay => pay.periodNumber === per.number).every(pay => pay.isPaid);
                  return (
                    <button
                      key={per.number}
                      onClick={() => setSelectedPeriodNumber(per.number)}
                      className={`w-full text-left p-3.5 rounded-2xl border text-xs font-semibold flex items-center justify-between transition-all ${
                        selectedPeriodNumber === per.number 
                          ? 'bg-indigo-50 border-indigo-200 text-indigo-950' 
                          : 'bg-white border-slate-100 hover:bg-slate-50 text-slate-700'
                      }`}
                    >
                      <div className="space-y-0.5">
                        <div className="font-bold">Periodo {per.number} ({formatLocalDateShort(per.paymentDate)})</div>
                        <div className="text-[10px] text-slate-400">Beneficiario: {per.beneficiaryName}</div>
                      </div>
                      {isWinnerPaid && <Icon name="CheckCircle" className="w-4 h-4 text-emerald-500" />}
                    </button>
                  );
                })}
              </div>

              {/* Selected Period Detail */}
              {currentPeriod && (
                <div className="col-span-2 bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-6">
                  <div className="flex flex-col sm:flex-row justify-between sm:items-start border-b border-slate-100 pb-5 gap-3">
                    <div className="space-y-1">
                      <span className="text-[10px] text-slate-400 uppercase tracking-widest font-mono font-bold">Turno de Cobro Seleccionado</span>
                      <h3 className="text-lg font-display font-black text-slate-900">Periodo #{currentPeriod.number} - {formatLocalDate(currentPeriod.paymentDate)}</h3>
                    </div>

                    <div className="flex gap-2">
                      <button
                        onClick={() => handleMarkAllPeriodAsPaid(currentPeriod.number)}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs px-4 py-2 rounded-xl transition-all shadow-md flex items-center gap-1.5"
                      >
                        Marcar Todo Pagado
                      </button>
                    </div>
                  </div>

                  {/* Beneficiary Card */}
                  <div className="bg-gradient-to-br from-indigo-50 to-indigo-100/30 border border-indigo-100 rounded-3xl p-5 flex justify-between items-center gap-4">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-display font-black text-lg shadow-md shadow-indigo-600/10">
                        {currentPeriod.number}
                      </div>
                      <div>
                        <span className="text-[10px] text-indigo-600 uppercase tracking-wider font-semibold">Beneficiario del Turno</span>
                        <h4 className="font-bold text-indigo-950 text-base">{currentPeriod.beneficiaryName}</h4>
                      </div>
                    </div>

                    <div>
                      <button
                        onClick={() => handleTogglePayoutDelivered(currentPeriod.number)}
                        className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-1.5 ${
                          currentPeriod.isPayoutDelivered 
                            ? 'bg-emerald-500 hover:bg-emerald-600 text-white' 
                            : 'bg-indigo-600 hover:bg-indigo-700 text-white'
                        }`}
                      >
                        <Icon name="Check" className="w-4 h-4" />
                        {currentPeriod.isPayoutDelivered ? 'Pozo Entregado' : 'Entregar Pozo'}
                      </button>
                    </div>
                  </div>

                  {/* Period contributions list */}
                  <div className="space-y-3">
                    <h4 className="text-xs font-bold text-slate-600 uppercase tracking-wider">Aportes del Periodo ({currentPeriodPaidCount}/{totalTickets})</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {currentPeriodPayments.map(pay => (
                        <div 
                          key={pay.id}
                          onClick={() => handleTogglePayment(pay.id)}
                          className={`p-4 border rounded-2xl flex justify-between items-center cursor-pointer transition-all ${
                            pay.isPaid 
                              ? 'bg-emerald-50/50 border-emerald-100 hover:border-emerald-200 text-emerald-950' 
                              : 'bg-slate-50 border-slate-100 hover:border-slate-205 text-slate-605'
                          }`}
                        >
                          <div className="min-w-0">
                            <h5 className="font-bold text-xs truncate">{pay.participantName}</h5>
                            <span className="text-[9px] font-mono text-slate-400 block">Cuota: ${pay.amount}</span>
                          </div>
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${pay.isPaid ? 'bg-emerald-100 text-emerald-800 border border-emerald-250' : 'bg-rose-100 text-rose-800 border border-rose-250'}`}>
                            {pay.isPaid ? 'Pagó' : 'Pendiente'}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>

                </div>
              )}
            </div>
          )}

          {/* Tab: Participants */}
          {activeTab === 'participants' && (
            <div className="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 overflow-hidden">
              <table className="w-full text-left text-xs text-slate-700">
                <thead>
                  <tr className="bg-slate-50 border-b border-slate-100 text-slate-400 font-bold uppercase tracking-wider">
                    <th className="px-6 py-4">Nombre</th>
                    <th className="px-6 py-4 text-center">Nº Cupos</th>
                    <th className="px-6 py-4 text-center">Turnos Cobrados</th>
                    <th className="px-6 py-4 text-right">Aportado</th>
                    <th className="px-6 py-4 text-right">Pendiente</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100 font-medium">
                  {participantStats.map(stat => {
                    const deliveredPayoutCount = stat.payoutTurns.filter(per => per.isPayoutDelivered).length;
                    return (
                      <tr key={stat.id} className="hover:bg-slate-50/50">
                        <td className="px-6 py-4">
                          <div className="font-bold text-slate-900">{stat.name}</div>
                        </td>
                        <td className="px-6 py-4 text-center font-mono font-bold text-slate-800">{stat.ticketsCount}</td>
                        <td className="px-6 py-4 text-center font-mono">
                          {deliveredPayoutCount} / {stat.payoutTurns.length}
                        </td>
                        <td className="px-6 py-4 text-right font-mono font-bold text-emerald-600">${stat.amountPaid.toLocaleString()}</td>
                        <td className="px-6 py-4 text-right font-mono font-bold text-rose-500">${stat.amountOwed.toLocaleString()}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
