    // Date Utilities
    function generatePaymentDates(startDateStr, frequency, count, paymentDay1, paymentDay2) {
      const dates = [];
      const baseDate = new Date(startDateStr + 'T12:00:00');

      function getSafeDate(year, month, day) {
        const lastDayOfMonth = new Date(year, month + 1, 0).getDate();
        const safeDay = Math.min(day, lastDayOfMonth);
        return new Date(year, month, safeDay, 12, 0, 0);
      }

      if (frequency === Frequency.MONTHLY && paymentDay1 !== undefined && paymentDay1 !== null) {
        let startYear = baseDate.getFullYear();
        let startMonth = baseDate.getMonth();
        const targetDay = parseInt(paymentDay1);

        let firstDate = getSafeDate(startYear, startMonth, targetDay);
        if (firstDate.getTime() < baseDate.getTime()) {
          startMonth += 1;
        }

        for (let i = 0; i < count; i++) {
          const currentDate = getSafeDate(startYear, startMonth + i, targetDay);
          const yyyy = currentDate.getFullYear();
          const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
          const dd = String(currentDate.getDate()).padStart(2, '0');
          dates.push(`${yyyy}-${mm}-${dd}`);
        }
        return dates;
      }

      if (frequency === Frequency.BIWEEKLY && paymentDay1 !== undefined && paymentDay2 !== undefined && paymentDay1 !== null && paymentDay2 !== null) {
        let startYear = baseDate.getFullYear();
        let startMonth = baseDate.getMonth();
        
        const day1 = Math.min(parseInt(paymentDay1), parseInt(paymentDay2));
        const day2 = Math.max(parseInt(paymentDay1), parseInt(paymentDay2));

        let candA = getSafeDate(startYear, startMonth, day1);
        let candB = getSafeDate(startYear, startMonth, day2);

        let useDay2 = false;
        let curMonth = startMonth;
        let curYear = startYear;

        if (baseDate.getTime() <= candA.getTime()) {
          useDay2 = false;
        } else if (baseDate.getTime() <= candB.getTime()) {
          useDay2 = true;
        } else {
          curMonth += 1;
          useDay2 = false;
        }

        for (let i = 0; i < count; i++) {
          const targetDay = useDay2 ? day2 : day1;
          const currentDate = getSafeDate(curYear, curMonth, targetDay);
          const yyyy = currentDate.getFullYear();
          const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
          const dd = String(currentDate.getDate()).padStart(2, '0');
          dates.push(`${yyyy}-${mm}-${dd}`);

          if (useDay2) {
            curMonth += 1;
            useDay2 = false;
          } else {
            useDay2 = true;
          }
        }
        return dates;
      }

      for (let i = 0; i < count; i++) {
        const currentDate = new Date(baseDate);
        if (frequency === Frequency.WEEKLY) {
          currentDate.setDate(baseDate.getDate() + (i * 7));
        } else if (frequency === Frequency.BIWEEKLY) {
          currentDate.setDate(baseDate.getDate() + (i * 15));
        } else if (frequency === Frequency.MONTHLY) {
          currentDate.setMonth(baseDate.getMonth() + i);
        }
        
        const yyyy = currentDate.getFullYear();
        const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
        const dd = String(currentDate.getDate()).padStart(2, '0');
        dates.push(`${yyyy}-${mm}-${dd}`);
      }
      return dates;
    }

    function formatLocalDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'T12:00:00');
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const formatted = date.toLocaleDateString('es-ES', options);
      return formatted.charAt(0).toUpperCase() + formatted.slice(1);
    }

    function formatLocalDateShort(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'T12:00:00');
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return date.toLocaleDateString('es-ES', options);
    }

        Play: <path strokeLinecap="round" strokeLinejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347c-.75.412-1.667-.13-1.667-.986V5.653Z" />,
        RotateCcw: <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
          {paths[name] || <path d="M12 9v3m0 0v3m0-3h3m-3 0H9" />}
        </svg>
      );
    }

    // App Main Component
    function App() {
      const [rounds, setRounds] = useState([]);
      const [selectedRoundId, setSelectedRoundId] = useState(null);
      const [view, setView] = useState('list');
      const [draftRound, setDraftRound] = useState(null);
      const [showExplanation, setShowExplanation] = useState(false);
      const [localUser, setLocalUser] = useState({ name: 'Organizador (Tú)' });

      // Sharing states
      const [importedRound, setImportedRound] = useState(null);
      const [installPrompt, setInstallPrompt] = useState(null);

      // Listen for PWA installation prompt
      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
        };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      // Cargar e Inicializar base de datos Firestore en Tiempo Real
      useEffect(() => {
        const unsubscribe = db.collection('rounds').onSnapshot((snapshot) => {
          const serverRounds = [];
          snapshot.forEach(doc => {
            serverRounds.push({ id: doc.id, ...doc.data() });
          });
          setRounds(serverRounds);
          localStorage.setItem('sams_rounds_data', JSON.stringify(serverRounds));
        }, (err) => {
          console.error("Error cargando de Firestore:", err);
        });
        return () => unsubscribe();
      }, []);

      // Load user profile & handle initial URL routing on mount
      useEffect(() => {
        const savedUser = localStorage.getItem('sams_user_profile');
        if (savedUser) {
          try { setLocalUser(JSON.parse(savedUser)); } catch(e) {}
        }

        const params = new URLSearchParams(window.location.search);
        const roundIdParam = params.get('roundId');

        // Cargar caché local primero para velocidad
        const savedRounds = localStorage.getItem('sams_rounds_data');
        let initialRounds = [DEMO_ROUND];
        if (savedRounds) {
          try { initialRounds = JSON.parse(savedRounds); } catch (e) {}
        }
        setRounds(initialRounds);

        // Auto-sanación: al cargar, resincronizar rondas locales que falten en Firestore
        db.collection('rounds').get().then((snapshot) => {
          const serverIds = [];
          snapshot.forEach(doc => serverIds.push(doc.id));
          
          initialRounds.forEach(localRound => {
            if (localRound && localRound.id && localRound.id !== 'demo-round-1') {
              if (!serverIds.includes(localRound.id)) {
                console.log("Subiendo ronda local faltante a Firestore:", localRound.name);
                db.collection('rounds').doc(localRound.id).set(localRound);
              }
            }
          });

          // Enrutamiento de link si viene con roundId
          if (roundIdParam) {
            db.collection('rounds').doc(roundIdParam).get().then((docSnap) => {
              if (docSnap.exists) {
                const foundRound = { id: docSnap.id, ...docSnap.data() };
                if (foundRound.status === RoundStatus.DRAFT) {
                  const savedUserProfile = savedUser ? JSON.parse(savedUser) : null;
                  const userName = savedUserProfile ? savedUserProfile.name : '';
                  const userExists = foundRound.participants?.some(p => p.name.trim().toLowerCase() === userName.trim().toLowerCase());
                  
                  if (userExists) {
                    setDraftRound(foundRound);
                    setView('raffle');
                  } else {
                    setImportedRound(foundRound);
                    setView('import');
                  }
                } else {
                  setSelectedRoundId(foundRound.id);
                  setView('details');
                }
              } else {
                alert("El Sam especificado no existe o fue eliminado de Firestore.");
              }
            });
          }
        });

        // Detección legacy import (?import=)
        const importData = params.get('import');
        if (importData) {
          try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(importData))));
            setImportedRound(decoded);
            setView('import');
          } catch(e) {
            console.error("Error decoding imported round", e);
          }
        }
      }, []);

      // Sincronizar el borrador actual (draftRound) si cambia en el servidor
      useEffect(() => {
        if (draftRound) {
          const updated = rounds.find(r => r.id === draftRound.id);
          if (updated) {
            if (updated.status !== RoundStatus.DRAFT) {
              setDraftRound(null);
              setSelectedRoundId(updated.id);
              setView('details');
            } else {
              setDraftRound(updated);
            }
          }
        }
      }, [rounds, draftRound?.id]);

      // Guardar localmente y sincronizar a Firestore (sin sobrescribir las demás)
      const syncRoundToServer = (round) => {
        db.collection('rounds').doc(round.id).set(round, { merge: true })
          .catch(err => console.error("Error sincronizando ronda a Firestore:", err));
      };

      const deleteRoundFromServer = (roundId) => {
        db.collection('rounds').doc(roundId).delete()
          .catch(err => console.error("Error eliminando ronda de Firestore:", err));
      };

      const saveRoundsToStorage = (updatedRounds) => {
        setRounds(updatedRounds);
        localStorage.setItem('sams_rounds_data', JSON.stringify(updatedRounds));
      };

      const handleUpdateProfileName = () => {
        const newName = prompt("¿Cómo quieres que te llamen en tus Sams? (Introduce tu apodo):", localUser.name);
        if (newName && newName.trim()) {
          const profile = { name: newName.trim() };
          setLocalUser(profile);
          localStorage.setItem('sams_user_profile', JSON.stringify(profile));
        }
      };

      const handleSelectRound = (round) => {
        if (round.status === RoundStatus.DRAFT) {
          setDraftRound(round);
          setView('raffle');
        } else {
          setSelectedRoundId(round.id);
          setView('details');
        }
      };

      const handleNewRoundSave = (newRound) => {
        const updated = [newRound, ...rounds];
        saveRoundsToStorage(updated);
        syncRoundToServer(newRound);
        setDraftRound(newRound);
        setView('raffle');
      };

      const handleRaffleComplete = (tickets) => {
        if (!draftRound) return;
        const totalTicketsCount = tickets.length;

        // 1. Generate payment dates
        const paymentDates = generatePaymentDates(
          draftRound.startDate,
          draftRound.frequency,
          totalTicketsCount,
          draftRound.paymentDay1,
          draftRound.paymentDay2
        );

        // 2. Create periods
        const periods = tickets.map((t, index) => ({
          number: index + 1,
          paymentDate: paymentDates[index],
          beneficiaryTicketId: t.id,
          beneficiaryName: t.participantName,
          isPayoutDelivered: false
        }));

        // 3. Create payments
        const payments = [];
        for (let pNum = 1; pNum <= totalTicketsCount; pNum++) {
          tickets.forEach(ticket => {
            payments.push({
              id: `${draftRound.id}-${pNum}-${ticket.id}`,
              periodNumber: pNum,
              ticketId: ticket.id,
              participantId: ticket.participantId,
              participantName: ticket.participantName,
              amount: draftRound.contributionPerTicket,
              isPaid: false
            });
          });
        }

        const activeRound = {
          ...draftRound,
          status: RoundStatus.ACTIVE,
          tickets,
          periods,
          payments
        };

        const updated = rounds.map(r => r.id === draftRound.id ? activeRound : r);
        saveRoundsToStorage(updated);
        syncRoundToServer(activeRound);
        setSelectedRoundId(activeRound.id);
        setDraftRound(null);
        setView('details');
      };

      const handleUpdateRound = (updatedRound) => {
        const updated = rounds.map(r => r.id === updatedRound.id ? updatedRound : r);
        saveRoundsToStorage(updated);
        syncRoundToServer(updatedRound);
      };

      const handleDeleteRound = (roundId) => {
        if (confirm("¿Estás seguro de que deseas eliminar este Sam/Tanda? Esta acción no se puede deshacer.")) {
          const updated = rounds.filter(r => r.id !== roundId);
          saveRoundsToStorage(updated);
          deleteRoundFromServer(roundId);
          setView('list');
          setSelectedRoundId(null);
        }
      };

      const handleImportAccept = (participantName, ticketsCount = 1) => {
        if (!importedRound) return;
        
        // Guardar apodo localmente
        const newProfile = { name: participantName };
        setLocalUser(newProfile);
        localStorage.setItem('sams_user_profile', JSON.stringify(newProfile));

        const roundRef = db.collection('rounds').doc(importedRound.id);

        if (importedRound.status === RoundStatus.DRAFT) {
          // Obtener última versión desde Firestore
          roundRef.get().then(docSnap => {
            let round = docSnap.exists ? docSnap.data() : { ...importedRound };
            if (!round.participants) round.participants = [];
            
            const existingIndex = round.participants.findIndex(p => p.name.trim().toLowerCase() === participantName.trim().toLowerCase());
            if (existingIndex >= 0) {
              round.participants[existingIndex].ticketsCount = ticketsCount;
            } else {
              round.participants.push({
                id: `p-${Date.now()}-${Math.random()}`,
                name: participantName,
                ticketsCount: ticketsCount
              });
            }
            
            return roundRef.set(round, { merge: true }).then(() => {
              window.history.replaceState({}, document.title, window.location.pathname);
              setImportedRound(null);
              setDraftRound({ id: importedRound.id, ...round });
              setView('raffle');
            });
          }).catch(err => {
            console.error("Error uniéndose al Sam en Firestore:", err);
            // Fallback local
            let updatedRound = { ...importedRound };
            if (updatedRound.participants) {
              const userExists = updatedRound.participants.some(p => p.name.trim().toLowerCase() === participantName.trim().toLowerCase());
              if (!userExists) {
                updatedRound.participants.push({
                  id: `p-${Date.now()}`,
                  name: participantName,
                  ticketsCount: ticketsCount
                });
              }
            }
            const otherRounds = rounds.filter(r => r.id !== updatedRound.id);
            const updated = [updatedRound, ...otherRounds];
            saveRoundsToStorage(updated);
            
            window.history.replaceState({}, document.title, window.location.pathname);
            setImportedRound(null);
            setDraftRound(updatedRound);
            setView('raffle');
          });
        } else {
          // Si ya está activa o completada, simplemente agregarla a Firestore si no está y redirigir
          roundRef.get().then(docSnap => {
            if (!docSnap.exists) {
              roundRef.set(importedRound);
            }
          });
          window.history.replaceState({}, document.title, window.location.pathname);
          setImportedRound(null);
          setSelectedRoundId(importedRound.id);
          setView('details');
        }
      };

      const handleImportReject = () => {
        window.history.replaceState({}, document.title, window.location.pathname);
        setImportedRound(null);
        setView('list');
      };

      const selectedRound = rounds.find(r => r.id === selectedRoundId);

      return (
        <div className="min-h-screen flex flex-col justify-between selection:bg-indigo-100 selection:text-indigo-950 font-sans antialiased text-slate-900">
          
          {/* Header */}
          <header className="border-b border-slate-100 bg-white/80 backdrop-blur-md sticky top-0 z-30 shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
            <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('list')}>
                <div className="w-10 h-10 bg-gradient-to-tr from-indigo-600 via-violet-600 to-pink-500 rounded-2xl flex items-center justify-center text-white shadow-md shadow-indigo-500/10 font-sans font-black text-lg transition-transform group-hover:scale-105 duration-200">
                  S
                </div>
                <div>
                  <h1 className="font-display font-bold text-lg text-slate-950 tracking-tight group-hover:text-indigo-600 transition-colors duration-200">
                    Gestor de Sams y Tandas
                  </h1>
                  <span className="text-[10px] text-indigo-600 font-mono font-bold uppercase tracking-wider block leading-none mt-0.5">
                    Bolso Financiero Personal
                  </span>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <button
                  onClick={() => setShowExplanation(!showExplanation)}
                  className="text-slate-500 hover:text-indigo-600 text-xs font-semibold px-3 py-2 hover:bg-slate-50 rounded-xl transition-all flex items-center gap-1.5 border border-transparent hover:border-slate-100"
                >
                  <Icon name="BookOpen" className="w-4 h-4" /> ¿Cómo funciona?
                </button>

                <div className="flex items-center gap-3 border-l border-slate-100 pl-3">
                  <div className="hidden sm:flex flex-col text-right">
                    <span className="text-[10px] text-slate-400 font-mono font-bold uppercase tracking-wider leading-none">
                      Perfil Local
                    </span>
                    <div className="flex items-center gap-1.5 mt-0.5 justify-end">
                      <span className="text-xs font-bold text-slate-800 max-w-[120px] truncate">
                        {localUser.name}
                      </span>
                      <button
                        onClick={handleUpdateProfileName}
                        className="text-slate-400 hover:text-indigo-600 transition-all p-0.5 hover:bg-slate-50 rounded"
                        title="Editar nombre"
                      >
                        <Icon name="Edit2" className="w-3 h-3" />
                      </button>
                    </div>
                  </div>
                  <div 
                    onClick={handleUpdateProfileName}
                    className="w-8 h-8 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-600 font-bold text-xs flex items-center justify-center shadow-inner cursor-pointer hover:bg-indigo-100 transition-all"
                  >
                    {localUser.name[0].toUpperCase()}
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-6xl mx-auto px-6 mt-8 flex-grow w-full">
            
            {/* Guide Quick Panel */}
            {showExplanation && (
              <div className="bg-gradient-to-br from-indigo-950 via-slate-900 to-indigo-900 text-slate-100 p-6 sm:p-8 rounded-3xl border border-indigo-500/20 shadow-xl relative overflow-hidden mb-6">
                <button
                  onClick={() => setShowExplanation(false)}
                  className="absolute top-4 right-4 text-indigo-300 hover:text-white hover:bg-indigo-800/40 p-1.5 rounded-full transition-all"
                >
                  <Icon name="X" className="w-5 h-5" />
                </button>
                <div className="max-w-2xl relative z-10">
                  <h3 className="text-xl font-display font-bold text-white mb-3">
                    Guía Rápida de Sams y Tandas 🏦
                  </h3>
                  <div className="space-y-3.5 text-sm text-slate-300 leading-relaxed">
                    <p>
                      Un <strong>Sam</strong>, <strong>Tanda</strong> o <strong>Bolso Financiero</strong> es un fondo de ahorro grupal y rotativo muy popular. Así es como funciona nuestro sistema:
                    </p>
                    <ul className="list-none pl-0 space-y-2">
                      <li className="flex items-start gap-2.5">
                        <span className="text-pink-400 font-bold mt-0.5">•</span>
                        <span>
                          <strong className="text-indigo-300 font-semibold">El Pozo (Monto Sam):</strong> Es el total neto que recibe el ganador de cada periodo (ej. $5,000).
                        </span>
                      </li>
                      <li className="flex items-start gap-2.5">
                        <span className="text-indigo-400 font-bold mt-0.5">•</span>
                        <span>
                          <strong className="text-indigo-300 font-semibold">División Equitativa:</strong> Si defines un pozo de $5,000 con 5 números (cupos) totales, cada número aporta una cuota de <strong>$1,000</strong> por periodo.
                        </span>
                      </li>
                      <li className="flex items-start gap-2.5">
                        <span className="text-pink-400 font-bold mt-0.5">•</span>
                        <span>
                          <strong className="text-indigo-300 font-semibold">Múltiples Cupos/Tickets:</strong> Puedes asignar a un participante más de 1 número (ej. Juan tiene 2 tickets). Esto significa que Juan aportará dos cuotas ($2,000) por periodo y cobrará el pozo dos veces en turnos diferentes.
                        </span>
                      </li>
                      <li className="flex items-start gap-2.5">
                        <span className="text-indigo-400 font-bold mt-0.5">•</span>
                        <span>
                          <strong className="text-indigo-300 font-semibold">Sorteo de Números:</strong> El sistema incluye un sorteo animado para decidir aleatoriamente quién recibe el pozo en cada turno (quincenal, mensual o semanal).
                        </span>
                      </li>
                      <li className="flex items-start gap-2.5">
                        <span className="text-pink-400 font-bold mt-0.5">•</span>
                        <span>
                          <strong className="text-indigo-300 font-semibold">Control de Pagos:</strong> Dispones de una matriz dinámica para marcar quién ha pagado y quién debe en tiempo real, guardándose todo en tu navegador.
                        </span>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            )}

            {/* View Switching */}
            {view === 'list' && (
              <RoundList 
                rounds={rounds} 
                onSelectRound={handleSelectRound} 
                onAddNewClick={() => setView('new-round')}
                onDeleteRound={handleDeleteRound}
              />
            )}

            {view === 'new-round' && (
              <NewRoundModal 
                onSave={handleNewRoundSave} 
                onCancel={() => setView('list')}
                localUserName={localUser.name}
              />
            )}

            {view === 'raffle' && draftRound && (
              <RaffleAnimation 
                round={draftRound} 
                onComplete={handleRaffleComplete} 
                onCancel={() => {
                  const updated = rounds.filter(r => r.id !== draftRound.id);
                  saveRoundsToStorage(updated);
                  setView('list');
                }}
              />
            )}

            {view === 'details' && selectedRound && (
              <RoundDetails 
                round={selectedRound} 
                onUpdateRound={handleUpdateRound} 
                onBack={() => setView('list')}
                onDeleteRound={handleDeleteRound}
              />
            )}

            {view === 'import' && importedRound && (
              <ContractImportScreen
                round={importedRound}
                onAccept={handleImportAccept}
                onReject={handleImportReject}
                localUserName={localUser.name}
                installPrompt={installPrompt}
              />
            )}

          </main>

          {/* Footer */}
          <footer className="mt-20 border-t border-zinc-100 py-8 text-center text-xs text-zinc-400">
            <div className="flex justify-center items-center gap-1.5">
              <span>Gestor de Sams y Tandas © 2026</span>
              <span>•</span>
              <span className="flex items-center gap-1">
                Hecho para tu seguridad financiera <Icon name="Heart" className="w-3.5 h-3.5 text-rose-500 animate-pulse" />
              </span>
            </div>
          </footer>

        </div>
      );
    }

    // Component: ContractImportScreen
    function ContractImportScreen({ round, onAccept, onReject, localUserName, installPrompt }) {
      const [agreed, setAgreed] = useState(false);
      
      // Buscar coincidencia inicial
      const matchedParticipant = round.participants?.find(p => p.name.trim().toLowerCase() === (localUserName || '').trim().toLowerCase());
      const [customName, setCustomName] = useState(matchedParticipant ? matchedParticipant.name : (localUserName || ''));
      const [isNewParticipant, setIsNewParticipant] = useState(!matchedParticipant);

      const [ticketsCount, setTicketsCount] = useState(matchedParticipant ? (matchedParticipant.ticketsCount || 1) : 1);
      const [isAccepted, setIsAccepted] = useState(false);
      const [showStaticConfirm, setShowStaticConfirm] = useState(false);
      const [copiedToken, setCopiedToken] = useState(false);

      const creatorName = round.participants && round.participants[0] ? round.participants[0].name : 'Organizador';
      const isDraft = round.status === 'Borrador';

      const handleAcceptClick = () => {
        if (!agreed) return;
        if (isDraft) {
          setShowStaticConfirm(true);
        } else {
          setIsAccepted(true);
        }
      };

      const handleFinish = () => {
        onAccept(customName.trim(), ticketsCount);
      };

      const handleInstallApp = () => {
        if (installPrompt) {
          installPrompt.prompt();
          installPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            } else {
              console.log('User dismissed the install prompt');
            }
          });
        } else {
          alert('Para instalar esta aplicación, haz clic en el botón de compartir de tu navegador y selecciona "Añadir a la pantalla de inicio" o busca el icono de instalar en la barra de direcciones.');
        }
      };

      // Generar token de confirmación para el creador
      const getConfirmationToken = () => {
        try {
          const data = {
            joinRoundId: round.id,
            name: customName.trim(),
            ticketsCount: ticketsCount
          };
          return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        } catch(e) {
          return "";
        }
      };

      const handleCopyConfirmationToken = () => {
        const token = getConfirmationToken();
        const textToCopy = `Hola, ya acepté el contrato de tu Sam "${round.name}". Me uní como "${customName.trim()}" con ${ticketsCount} cupo(s). Registra mi código de confirmación en la app:\n\n${token}`;
        navigator.clipboard.writeText(textToCopy).then(() => {
          setCopiedToken(true);
          setTimeout(() => setCopiedToken(false), 2000);
        });
      };

      if (showStaticConfirm) {
        return (
          <div className="max-w-xl mx-auto px-4 py-8">
            <div className="bg-white rounded-3xl border border-indigo-100 shadow-xl p-8 text-center space-y-6">
              <div className="w-16 h-16 bg-indigo-50 border border-indigo-100 text-indigo-650 rounded-full flex items-center justify-center mx-auto shadow-md">
                <Icon name="Share2" className="w-8 h-8" />
              </div>

              <div className="space-y-2">
                <h2 className="text-2xl font-display font-bold text-slate-900 tracking-tight">
                  ¡Confirmación Lista! ✉️
                </h2>
                <p className="text-sm text-slate-500 max-w-sm mx-auto leading-relaxed">
                  Dado que estás en la versión web compartida, debes enviarle tu código de aceptación al organizador para que te añada oficialmente al sorteo.
                </p>
              </div>

              <div className="space-y-2 text-left">
                <label className="text-[10px] font-mono font-bold text-slate-400 uppercase tracking-wider block">Mensaje de Confirmación</label>
                <div className="bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs text-slate-600 font-mono break-all max-h-32 overflow-y-auto">
                  {`Hola, ya acepté el contrato de tu Sam "${round.name}". Me uní como "${customName.trim()}" con ${ticketsCount} cupo(s)...`}
                </div>
              </div>

              <div className="flex flex-col sm:flex-row gap-3 pt-2">
                <button
                  onClick={handleCopyConfirmationToken}
                  className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl transition-all shadow-md text-sm flex items-center justify-center gap-1.5"
                >
                  <Icon name="Share2" className="w-4 h-4" />
